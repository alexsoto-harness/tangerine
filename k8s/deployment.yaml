---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-sample
  labels:
    app: spring-boot-sample
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-boot-sample
  template:
    metadata:
      labels:
        app: spring-boot-sample
    spec:
      imagePullSecrets:
        - name: {{.Values.imagePullSecretName}}
      containers:
        - name: spring-boot-sample
          image: {{.Values.image}}
          ports:
            - containerPort: 8080