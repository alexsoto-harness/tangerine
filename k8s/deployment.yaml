{{- /* if .Values.dockercfg */}}  
# apiVersion: v1  
# kind: Secret  
# metadata:  
#   name: {{ lower .Values.name }}-dockercfg  
#   annotations:  
#     harness.io/skip-versioning: "true"  
# data:  
#   .dockercfg: {{ .Values.dockercfg }}  
# type: kubernetes.io/dockercfg  
# ---  
{{- /* end */}} 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ lower .Values.name }}
  labels:
    app: {{ lower .Values.name }}
spec:
  replicas: {{int .Values.replicas}}
  selector:
    matchLabels:
      app: {{ lower .Values.name }}
  template:
    metadata:
      labels:
        app: {{ lower .Values.name }}
    spec:
      # {{- if .Values.dockercfg }} 
      # imagePullSecrets:
      #   - name: {{ lower .Values.name }}-dockercfg
      # {{- end}}
      containers:
        - name: {{ lower .Values.name }}
          image: {{ .Values.image }}
          ports:
            - containerPort: 8080