name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_NAME: "tangerine-spring-boot-sample"
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_ORG: ${{ vars.SNYK_ORG }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build with Maven (includes SBOM generation)
        run: mvn -B clean install

      - name: Copy SBOM to security-scans
        run: cp target/sbom.json security-scans/sbom.json

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build -t docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:$SHORT_SHA .
          docker push docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:$SHORT_SHA

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: security-scans/sbom.json

  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: security-scans/

      - name: Install Gitleaks
        run: |
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks scan (full history)
        run: |
          gitleaks detect --source . --report-format sarif --report-path security-scans/gitleaks-scan.sarif --exit-code 0

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Docker scan and export SARIF
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          snyk container test docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:$SHORT_SHA \
            --org=${{ env.SNYK_ORG }} \
            --sarif-file-output=security-scans/snyk-container-scan.sarif \
            || true

      - name: Snyk monitor (save results to dashboard)
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          snyk container monitor docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:$SHORT_SHA \
            --org=${{ env.SNYK_ORG }}

      - name: Commit scan results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add security-scans/
          git diff --staged --quiet || git commit -m "Update security scan results [skip ci]"
          git push

  notify:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Trigger Harness Pipeline
        env:
          HARNESS_WEBHOOK_URL: ${{ secrets.HARNESS_WEBHOOK_URL }}
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE_NAME="${{ vars.DOCKERHUB_USERNAME }}/${{ env.PROJECT_NAME }}"
          IMAGE_TAG="${SHORT_SHA}"
          IMAGE_FULL="index.docker.io/${IMAGE_NAME}:${IMAGE_TAG}"
          
          # Determine event type and action
          EVENT_NAME="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          
          # PR-specific fields
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_MERGED="${{ github.event.pull_request.merged }}"
          PR_SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          
          # Release-specific fields
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_PRERELEASE="${{ github.event.release.prerelease }}"
          
          # Commit info
          COMMIT_MESSAGE=$(echo '${{ github.event.head_commit.message }}' | head -1 | sed 's/"/\\"/g')
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
          
          # Build payload
          PAYLOAD=$(cat <<EOF
          {
            "image_full": "${IMAGE_FULL}",
            "image_name": "${IMAGE_NAME}",
            "image_tag": "${IMAGE_TAG}",
            "sha": "${{ github.sha }}",
            "short_sha": "${SHORT_SHA}",
            "run_number": "${{ github.run_number }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "repo_name": "${{ github.event.repository.name }}",
            "repo_full_name": "${{ github.repository }}",
            "repo_url": "${{ github.server_url }}/${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "ref": "${{ github.ref }}",
            "event_name": "${EVENT_NAME}",
            "action": "${ACTION}",
            "actor": "${{ github.actor }}",
            "sender_type": "${{ github.event.sender.type }}",
            "pr_number": ${PR_NUMBER:-null},
            "pr_title": ${PR_TITLE:+\"$PR_TITLE\"}${PR_TITLE:-null},
            "pr_merged": ${PR_MERGED:-false},
            "pr_source_branch": ${PR_SOURCE_BRANCH:+\"$PR_SOURCE_BRANCH\"}${PR_SOURCE_BRANCH:-null},
            "pr_target_branch": ${PR_TARGET_BRANCH:+\"$PR_TARGET_BRANCH\"}${PR_TARGET_BRANCH:-null},
            "release_tag": ${RELEASE_TAG:+\"$RELEASE_TAG\"}${RELEASE_TAG:-null},
            "release_name": ${RELEASE_NAME:+\"$RELEASE_NAME\"}${RELEASE_NAME:-null},
            "release_prerelease": ${RELEASE_PRERELEASE:-false},
            "commit_message": "${COMMIT_MESSAGE}",
            "commit_author": "${COMMIT_AUTHOR}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          )
          
          echo "Sending payload to Harness webhook..."
          echo "${PAYLOAD}" | jq .
          
          curl -X POST \
            -H 'content-type: application/json' \
            --url "${HARNESS_WEBHOOK_URL}" \
            -d "${PAYLOAD}" \
            --fail-with-body
