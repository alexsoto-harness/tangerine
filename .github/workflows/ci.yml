name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_NAME: "tangerine-spring-boot-sample"
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  SNYK_ORG: ${{ vars.SNYK_ORG }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build with Maven (includes SBOM generation)
        run: mvn -B clean install

      - name: Copy SBOM to security-scans
        run: cp target/sbom.json security-scans/sbom.json

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build -t docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:$SHORT_SHA .
          docker push docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:$SHORT_SHA

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: security-scans/sbom.json

  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: security-scans/

      - name: Install Gitleaks
        run: |
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks scan (full history)
        run: |
          gitleaks detect --source . --report-format sarif --report-path security-scans/gitleaks-scan.sarif --exit-code 0

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Docker scan and export SARIF
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          snyk container test docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:$SHORT_SHA \
            --org=${{ env.SNYK_ORG }} \
            --sarif-file-output=security-scans/snyk-container-scan.sarif \
            || true

      - name: Snyk monitor (save results to dashboard)
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          snyk container monitor docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:$SHORT_SHA \
            --org=${{ env.SNYK_ORG }}

      - name: Commit scan results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add security-scans/
          git diff --staged --quiet || git commit -m "Update security scan results [skip ci]"
          git push

