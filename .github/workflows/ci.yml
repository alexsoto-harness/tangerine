name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GCP_TOKEN: ${{ secrets.GCP_TOKEN }}
      PROJECT_NAME: "tangerine-spring-boot-sample"

      GKE_CLUSTER: "se-sandbox"
      GKE_LOCATION: "us-east1-b"
      GKE_PROJECT: "sales-209522"
      SNYK_ORG: ${{ vars.SNYK_ORG }}

    steps:
      - uses: actions/checkout@v3
      - name: Build with Maven
        run: mvn -B clean install

#      - name: Run Snyk Maven scan
#        uses: snyk/actions/maven-3-jdk-17@master
#        continue-on-error: true
#        with:
#          args: --all-projects --org=$SNYK_ORG
#      - name: Snyk monitor (save results to dashboard)
#        uses: snyk/actions/maven-3-jdk-17@master
#        with:
#          command: monitor
#          args: --all-projects --org=$SNYK_ORG
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          docker build -t docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest .
          docker push docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest

      - name: Run Snyk Docker scan
        uses: snyk/actions/docker@master
        continue-on-error: true
        with:
          image: docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest
          args: --org=${{ env.SNYK_ORG }}
      
      - name: Snyk monitor (save results to dashboard)
        uses: snyk/actions/docker@master
        with:
          image: docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest
          command: monitor
          args: --org=${{ env.SNYK_ORG }}

