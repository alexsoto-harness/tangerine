name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      GCP_TOKEN: ${{ secrets.GCP_TOKEN }}
      PROJECT_NAME: "tangerine-spring-boot-sample"

      GKE_CLUSTER: "se-sandbox"
      GKE_LOCATION: "us-east1-b"
      GKE_PROJECT: "sales-209522"
      SNYK_ORG: ${{ vars.SNYK_ORG }}

    steps:
      - uses: actions/checkout@v3
      - name: Build with Maven
        run: mvn -B clean install

#      - name: Run Snyk Maven scan
#        uses: snyk/actions/maven-3-jdk-17@master
#        continue-on-error: true
#        with:
#          args: --all-projects --org=$SNYK_ORG
#      - name: Snyk monitor (save results to dashboard)
#        uses: snyk/actions/maven-3-jdk-17@master
#        with:
#          command: monitor
#          args: --all-projects --org=$SNYK_ORG
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          docker build -t docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest .
          docker push docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Docker scan and export SARIF
        run: |
          snyk container test docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest \
            --org=${{ env.SNYK_ORG }} \
            --sarif-file-output=security-scans/snyk-container-scan.sarif \
            || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk monitor (save results to dashboard)
        run: |
          snyk container monitor docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest \
            --org=${{ env.SNYK_ORG }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Commit scan results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add security-scans/
          git diff --staged --quiet || git commit -m "Update Snyk scan results [skip ci]"
          git push

