name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  GCP_TOKEN: ${{ secrets.GCP_TOKEN }}
  PROJECT_NAME: "tangerine-spring-boot-sample"
  GKE_CLUSTER: "se-sandbox"
  GKE_LOCATION: "us-east1-b"
  GKE_PROJECT: "sales-209522"
  SNYK_ORG: ${{ vars.SNYK_ORG }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build with Maven
        run: mvn -B clean install

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          docker build -t docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest .
          docker push docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest

  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
        continue-on-error: true

      - name: Export Gitleaks results to SARIF
        run: |
          docker run --rm -v $(pwd):/repo zricethezav/gitleaks:latest detect \
            --source /repo \
            --report-format sarif \
            --report-path /repo/security-scans/gitleaks-scan.sarif \
            --exit-code 0

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Docker scan and export SARIF
        run: |
          snyk container test docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest \
            --org=${{ env.SNYK_ORG }} \
            --sarif-file-output=security-scans/snyk-container-scan.sarif \
            || true

      - name: Snyk monitor (save results to dashboard)
        run: |
          snyk container monitor docker.io/$DOCKERHUB_USERNAME/$PROJECT_NAME:latest \
            --org=${{ env.SNYK_ORG }}

      - name: Commit scan results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add security-scans/
          git diff --staged --quiet || git commit -m "Update Snyk scan results [skip ci]"
          git push

