pipeline:
  name: Tangerine Reference Architecture
  identifier: tang
  projectIdentifier: soto_sandbox
  orgIdentifier: sandbox
  tags: {}
  stages:
    - stage:
        name: Audit
        identifier: audit
        description: Log trigger payload for auditability
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Print Trigger Info
                  identifier: print_trigger_info
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash

                          # Build the audit output in JIRA wiki markup
                          AUDIT_OUTPUT=$(cat <<'EOF'
                          h1. 🚀 Pipeline Execution Audit

                          h2. 📦 Artifact Info
                          ||Property||Value||
                          |Image Full|<+trigger.payload.image_full>|
                          |Image Name|<+trigger.payload.image_name>|
                          |Image Tag|<+trigger.payload.image_tag>|

                          ----

                          h2. 🔗 Git Info
                          ||Property||Value||
                          |Repository|<+trigger.payload.repo_name>|
                          |Full Name|<+trigger.payload.repo_full_name>|
                          |Branch|<+trigger.payload.branch>|
                          |Ref|<+trigger.payload.ref>|
                          |SHA|<+trigger.payload.sha>|
                          |Short SHA|<+trigger.payload.short_sha>|

                          ----

                          h2. 💬 Commit Info
                          ||Property||Value||
                          |Message|<+trigger.payload.commit_message>|
                          |Author|<+trigger.payload.commit_author>|

                          ----

                          h2. ⚙️ GitHub Actions
                          ||Property||Value||
                          |Run Number|<+trigger.payload.run_number>|
                          |Run ID|<+trigger.payload.run_id>|
                          |Run URL|<+trigger.payload.run_url>|

                          ----

                          h2. 📅 Event Info
                          ||Property||Value||
                          |Event Name|<+trigger.payload.event_name>|
                          |Action|<+trigger.payload.action>|
                          |Actor|<+trigger.payload.actor>|
                          |Sender Type|<+trigger.payload.sender_type>|
                          |Timestamp|<+trigger.payload.timestamp>|

                          ----

                          h2. 🔀 PR Info (if applicable)
                          ||Property||Value||
                          |PR Number|<+trigger.payload.pr_number>|
                          |PR Title|<+trigger.payload.pr_title>|
                          |PR Merged|<+trigger.payload.pr_merged>|
                          |Source Branch|<+trigger.payload.pr_source_branch>|
                          |Target Branch|<+trigger.payload.pr_target_branch>|

                          ----

                          h2. 🏷️ Release Info (if applicable)
                          ||Property||Value||
                          |Release Tag|<+trigger.payload.release_tag>|
                          |Release Name|<+trigger.payload.release_name>|
                          |Pre-release|<+trigger.payload.release_prerelease>|

                          ----

                          h2. 🎯 Harness Context
                          ||Property||Value||
                          |Pipeline|<+pipeline.name>|
                          |Execution ID|<+pipeline.executionId>|
                          |Trigger Type|<+pipeline.triggerType>|
                          |Started At|<+pipeline.startTs>|

                          ----
                          {panel:title=End of Audit Log|borderColor=#ccc|bgColor=#f5f5f5}
                          Generated by Harness Pipeline
                          {panel}
                          EOF
                          )

                          echo "$AUDIT_OUTPUT"

                          # Export to output variable
                          export AUDIT_LOG="$AUDIT_OUTPUT"
                    timeout: 10m
                    environmentVariables: []
                    outputVariables:
                      - name: AUDIT_LOG
                        type: String
                        value: AUDIT_LOG
                  timeout: 10m
                  when:
                    stageStatus: Success
                    condition: <+pipeline.triggerType> != "MANUAL"
              - step:
                  type: JiraCreate
                  name: Create Jira Ticket
                  identifier: Create_Jira_Ticket
                  spec:
                    connectorRef: account.Harness_JIRA
                    projectKey: HD
                    issueType: Task
                    fields:
                      - name: Assignee
                        value: alejandro.soto@harness.io
                      - name: Comment
                        value: Deployment pipeline has started
                      - name: Description
                        value: <+execution.steps.print_trigger_info.output.outputVariables.AUDIT_LOG>
                      - name: Implementation Phase
                        value: QA
                      - name: What Changed ?
                        value: No Breaking Changes Possible
                      - name: Summary
                        value: "Deployment Tracking: <+pipeline.variables.image_name>:<+pipeline.variables.image_tag>"
                  timeout: 10m
        when:
          pipelineStatus: Success
    - stage:
        name: Secure
        identifier: sec
        description: ""
        type: SecurityTests
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: false
            paths: []
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - stepGroup:
                  name: Code Quality
                  identifier: Code_Quality
                  steps:
                    - parallel:
                        - step:
                            type: Gitleaks
                            name: Secret Detection
                            identifier: Secret_Detection
                            spec:
                              mode: ingestion
                              config: default
                              target:
                                type: repository
                                detection: manual
                                name: <+pipeline.variables.repo_full_name>
                                variant: main
                              advanced:
                                log:
                                  level: info
                              ingestion:
                                file: security-scans/gitleaks-scan.sarif
                            enforce:
                              policySets:
                                - nocrits
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - AllErrors
                                  action:
                                    type: MarkAsSuccess
                            timeout: 5m
                        - step:
                            type: Sonarqube
                            name: SonarQube
                            identifier: SonarQube
                            spec:
                              mode: extraction
                              config: default
                              target:
                                type: repository
                                detection: manual
                                name: <+pipeline.variables.repo_full_name>
                                variant: <+pipeline.variables.branch>
                              advanced:
                                log:
                                  level: info
                              auth:
                                access_token: <+secrets.getValue("sonarqube-token")>
                                domain: https://sonarcloud.io
                                ssl: true
                              tool:
                                project_key: alexsoto-harness_<+pipeline.variables.repo_name>
                            enforce:
                              policySets:
                                - nocrits
              - stepGroup:
                  name: Security Scans
                  identifier: Security_Scans
                  steps:
                    - stepGroup:
                        name: SCA
                        identifier: SCA
                        steps:
                          - parallel:
                              - step:
                                  type: Owasp
                                  name: Owasp
                                  identifier: Owasp_1
                                  spec:
                                    mode: orchestration
                                    config: default
                                    target:
                                      type: repository
                                      detection: auto
                                    advanced:
                                      log:
                                        level: info
                                  enforce:
                                    policySets:
                                      - nocrits
                                  failureStrategies:
                                    - onFailure:
                                        errors:
                                          - AllErrors
                                        action:
                                          type: MarkAsSuccess
                                  timeout: 5m
                              - step:
                                  type: OsvScanner
                                  name: OsvScanner
                                  identifier: OsvScanner_1
                                  spec:
                                    mode: orchestration
                                    config: default
                                    target:
                                      type: repository
                                      detection: auto
                                    advanced:
                                      log:
                                        level: info
                                  enforce:
                                    policySets:
                                      - nocrits
                    - stepGroup:
                        name: SAST
                        identifier: SAST
                        steps:
                          - step:
                              type: Semgrep
                              name: Semgrep
                              identifier: Semgrep
                              spec:
                                mode: orchestration
                                config: default
                                target:
                                  type: repository
                                  detection: auto
                                advanced:
                                  log:
                                    level: info
                              enforce:
                                policySets:
                                  - nocrits
                    - stepGroup:
                        name: Image Scans
                        identifier: Image_Scans
                        steps:
                          - step:
                              type: Snyk
                              name: Snyk Container Scan
                              identifier: Snyk_Container_Scan
                              spec:
                                mode: ingestion
                                config: container
                                target:
                                  type: container
                                  detection: manual
                                  name: <+pipeline.variables.image_name>
                                  variant: <+pipeline.variables.image_tag>
                                advanced:
                                  log:
                                    level: info
                                privileged: true
                                ingestion:
                                  file: security-scans/snyk-container-scan.sarif
                              enforce:
                                policySets:
                                  - nocrits
                      contextType: Pipeline
              - stepGroup:
                  name: Attestation
                  identifier: Attestation
                  steps:
                    - parallel:
                        - step:
                            type: SscaOrchestration
                            name: SBOM Enforcement
                            identifier: SBOM_Ingestion
                            spec:
                              mode: ingestion
                              ingestion:
                                file: security-scans/sbom.json
                              source:
                                type: repository
                                spec:
                                  url: https://github.com/<+pipeline.variables.repo_full_name>
                                  variant_type: branch
                                  variant: <+pipeline.variables.branch>
                              sbom_drift:
                                base: repository
                                spec:
                                  variant: <+pipeline.variables.branch>
                              resources:
                                limits:
                                  memory: 500Mi
                                  cpu: "0.5"
                        - step:
                            type: SscaArtifactVerification
                            name: Artifact Verification
                            identifier: Artifact_Verification
                            spec:
                              source:
                                type: docker
                                spec:
                                  connector: dockerhubalexsotoharness
                                  image: docker.io/<+pipeline.variables.image_name>:<+pipeline.variables.image_tag>
                              verifySign:
                                type: cosign
                                spec:
                                  public_key: tangerine-cosign-pub
                        - step:
                            type: SlsaVerification
                            name: SLSA Verification
                            identifier: SLSA_Verification
                            spec:
                              source:
                                type: Docker
                                spec:
                                  connector: account.DockerHub
                                  image_path: <+pipeline.variables.image_name>:<+pipeline.variables.image_tag>
                            failureStrategies:
                              - onFailure:
                                  errors:
                                    - AllErrors
                                  action:
                                    type: Ignore
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Ignore
        when:
          pipelineStatus: Success
    - stage:
        name: Attest
        identifier: Attest
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Parse Attestation Results
                  identifier: Parse_Attestation_Results
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash

                          # Build the security attestation report in JIRA wiki markup
                          ATTESTATION_REPORT=$(cat <<'EOF'
                          h1. 🔒 Security Attestation Report

                          h2. 🔍 Gitleaks (Secret Detection)
                          ||Severity||Count||
                          |TOTAL|<+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.Secret_Detection.output.outputVariables.TOTAL>|
                          |CRITICAL|<+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.Secret_Detection.output.outputVariables.CRITICAL>|
                          |HIGH|<+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.Secret_Detection.output.outputVariables.HIGH>|
                          |MEDIUM|<+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.Secret_Detection.output.outputVariables.MEDIUM>|
                          |LOW|<+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.Secret_Detection.output.outputVariables.LOW>|

                          *Policy:* <+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.Secret_Detection.policyOutput.policySetDetails.nocrits.name>
                          *Status:* <+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.Secret_Detection.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.status>
                          *Deny Message:* <+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.Secret_Detection.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.denyMessages>

                          ----

                          h2. 📊 SonarQube (Code Quality)
                          ||Severity||Count||
                          |TOTAL|<+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.SonarQube.output.outputVariables.TOTAL>|
                          |CRITICAL|<+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.SonarQube.output.outputVariables.CRITICAL>|
                          |HIGH|<+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.SonarQube.output.outputVariables.HIGH>|
                          |MEDIUM|<+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.SonarQube.output.outputVariables.MEDIUM>|
                          |LOW|<+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.SonarQube.output.outputVariables.LOW>|

                          *Policy:* <+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.SonarQube.policyOutput.policySetDetails.nocrits.name>
                          *Status:* <+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.SonarQube.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.status>
                          *Deny Message:* <+pipeline.stages.sec.spec.execution.steps.Code_Quality.steps.SonarQube.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.denyMessages>

                          ----

                          h2. 📦 OWASP (Dependency Check)
                          ||Severity||Count||
                          |TOTAL|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.Owasp_1.output.outputVariables.TOTAL>|
                          |CRITICAL|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.Owasp_1.output.outputVariables.CRITICAL>|
                          |HIGH|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.Owasp_1.output.outputVariables.HIGH>|
                          |MEDIUM|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.Owasp_1.output.outputVariables.MEDIUM>|
                          |LOW|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.Owasp_1.output.outputVariables.LOW>|

                          *Policy:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.Owasp_1.policyOutput.policySetDetails.nocrits.name>
                          *Status:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.Owasp_1.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.status>
                          *Deny Message:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.Owasp_1.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.denyMessages>

                          ----

                          h2. 🛡️ OSV Scanner (Vulnerability Scanner)
                          ||Severity||Count||
                          |TOTAL|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.OsvScanner_1.output.outputVariables.TOTAL>|
                          |CRITICAL|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.OsvScanner_1.output.outputVariables.CRITICAL>|
                          |HIGH|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.OsvScanner_1.output.outputVariables.HIGH>|
                          |MEDIUM|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.OsvScanner_1.output.outputVariables.MEDIUM>|
                          |LOW|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.OsvScanner_1.output.outputVariables.LOW>|

                          *Policy:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.OsvScanner_1.policyOutput.policySetDetails.nocrits.name>
                          *Status:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.OsvScanner_1.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.status>
                          *Deny Message:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SCA.steps.OsvScanner_1.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.denyMessages>

                          ----

                          h2. 🔬 Semgrep (SAST)
                          ||Severity||Count||
                          |TOTAL|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SAST.steps.Semgrep.output.outputVariables.TOTAL>|
                          |CRITICAL|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SAST.steps.Semgrep.output.outputVariables.CRITICAL>|
                          |HIGH|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SAST.steps.Semgrep.output.outputVariables.HIGH>|
                          |MEDIUM|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SAST.steps.Semgrep.output.outputVariables.MEDIUM>|
                          |LOW|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SAST.steps.Semgrep.output.outputVariables.LOW>|

                          *Policy:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SAST.steps.Semgrep.policyOutput.policySetDetails.nocrits.name>
                          *Status:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SAST.steps.Semgrep.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.status>
                          *Deny Message:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.SAST.steps.Semgrep.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.denyMessages>

                          ----

                          h2. 🐳 Snyk (Container Scan)
                          ||Severity||Count||
                          |TOTAL|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.Image_Scans.steps.Snyk_Container_Scan.output.outputVariables.TOTAL>|
                          |CRITICAL|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.Image_Scans.steps.Snyk_Container_Scan.output.outputVariables.CRITICAL>|
                          |HIGH|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.Image_Scans.steps.Snyk_Container_Scan.output.outputVariables.HIGH>|
                          |MEDIUM|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.Image_Scans.steps.Snyk_Container_Scan.output.outputVariables.MEDIUM>|
                          |LOW|<+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.Image_Scans.steps.Snyk_Container_Scan.output.outputVariables.LOW>|

                          *Policy:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.Image_Scans.steps.Snyk_Container_Scan.policyOutput.policySetDetails.nocrits.name>
                          *Status:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.Image_Scans.steps.Snyk_Container_Scan.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.status>
                          *Deny Message:* <+pipeline.stages.sec.spec.execution.steps.Security_Scans.steps.Image_Scans.steps.Snyk_Container_Scan.policyOutput.policySetDetails.nocrits.policyDetails.nocrit.denyMessages>

                          ----

                          h2. 📋 SBOM (Software Bill of Materials)
                          ||Property||Value||
                          |Base Source|<+pipeline.stages.sec.spec.execution.steps.Attestation.steps.SBOM_Ingestion.artifact_Attestation_SBOM_Ingestion.stepArtifacts.publishedSbomArtifacts[0].name>|
                          |Branch|<+pipeline.stages.sec.spec.execution.steps.Attestation.steps.SBOM_Ingestion.artifact_Attestation_SBOM_Ingestion.stepArtifacts.publishedSbomArtifacts[0].tag>|
                          |SBOM ID|<+pipeline.stages.sec.spec.execution.steps.Attestation.steps.SBOM_Ingestion.artifact_Attestation_SBOM_Ingestion.stepArtifacts.publishedSbomArtifacts[0].sbomName>|
                          |SBOM Score|<+pipeline.stages.sec.spec.execution.steps.Attestation.steps.SBOM_Ingestion.artifact_Attestation_SBOM_Ingestion.stepArtifacts.publishedSbomArtifacts[0].scorecard.avgScore> / 10|
                          |Drift Detected|<+pipeline.stages.sec.spec.execution.steps.Attestation.steps.SBOM_Ingestion.artifact_Attestation_SBOM_Ingestion.stepArtifacts.publishedSbomArtifacts[0].drift.totalDrifts>|

                          h3. Component Risks
                          ||Risk Type||Count||
                          |Close to EOL|<+pipeline.stages.sec.spec.execution.steps.Attestation.steps.SBOM_Ingestion.artifact_Attestation_SBOM_Ingestion.stepArtifacts.publishedSbomArtifacts[0].ossRisksSummary.closeToEolComponentCount>|
                          |Outdated|<+pipeline.stages.sec.spec.execution.steps.Attestation.steps.SBOM_Ingestion.artifact_Attestation_SBOM_Ingestion.stepArtifacts.publishedSbomArtifacts[0].ossRisksSummary.outdatedComponentCount>|
                          |Unmaintained|<+pipeline.stages.sec.spec.execution.steps.Attestation.steps.SBOM_Ingestion.artifact_Attestation_SBOM_Ingestion.stepArtifacts.publishedSbomArtifacts[0].ossRisksSummary.unmaintainedComponentCount>|

                          ----
                          {panel:title=End of Security Attestation Report|borderColor=#ccc|bgColor=#f5f5f5}
                          Generated by Harness Pipeline
                          {panel}
                          EOF
                          )

                          echo "$ATTESTATION_REPORT"

                          # Export to output variable
                          export SECURITY_ATTESTATION="$ATTESTATION_REPORT"
                    environmentVariables: []
                    outputVariables:
                      - name: SECURITY_ATTESTATION
                        type: String
                        value: SECURITY_ATTESTATION
                  timeout: 10m
              - step:
                  type: JiraUpdate
                  name: Update Attestation Evidence to Jira
                  identifier: Update_Attestation_Evidence_to_Jira
                  spec:
                    connectorRef: account.Harness_JIRA
                    issueKey: <+pipeline.stages.audit.spec.execution.steps.Create_Jira_Ticket.issue.key>
                    transitionTo:
                      transitionName: ""
                      status: In Progress
                    fields:
                      - name: Comment
                        value: <+execution.steps.Parse_Attestation_Results.output.outputVariables.SECURITY_ATTESTATION>
                    issueType: Change
                    projectKey: HD
                  timeout: 10m
        tags: {}
    - stage:
        name: Deploy to Mock
        identifier: Deploy_to_Mock
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: Tangerine_Sample
          environment:
            environmentRef: Mock_GKE_Tangerine
            deployToAll: false
            infrastructureDefinitions:
              - identifier: Mock_GKE
          execution:
            steps:
              - stepGroup:
                  name: Blue Green Deployment
                  identifier: Blue_Green_Deployment
                  steps:
                    - step:
                        name: Stage Deployment
                        identifier: stageDeployment
                        type: K8sBlueGreenDeploy
                        timeout: 10m
                        spec:
                          skipDryRun: false
                          pruningEnabled: false
                    - stepGroup:
                        name: QA Testing
                        identifier: QA_Testing
                        steps:
                          - parallel:
                              - step:
                                  type: Http
                                  name: Selenium Regression Testin
                                  identifier: Selenium_Regression_Testin
                                  spec:
                                    url: https://harness.free.beeceptor.com/selenium-test-report
                                    method: GET
                                    headers: []
                                    inputVariables: []
                                    outputVariables: []
                                  timeout: 10s
                              - step:
                                  type: Http
                                  name: Playwright Functional Testing
                                  identifier: Playwright_Functional_Testing
                                  spec:
                                    url: https://harness.free.beeceptor.com/playwright-report
                                    method: GET
                                    headers: []
                                    inputVariables: []
                                    outputVariables: []
                                  timeout: 10s
                      contextType: Pipeline
                    - step:
                        type: ShellScript
                        name: Parse Test Results
                        identifier: Parse_Test_Results
                        spec:
                          shell: Bash
                          executionTarget: {}
                          source:
                            type: Inline
                            spec:
                              script: |-
                                #!/bin/bash
                                 
                                # Build the QA test results report in JIRA wiki markup
                                TEST_RESULTS=$(cat <<'EOF'
                                h1. 🧪 QA Test Results Report
                                 
                                h2. 🔬 Selenium Regression Testing
                                *Status:* <+pipeline.stages.Deploy_to_Mock.spec.execution.steps.Blue_Green_Deployment.steps.QA_Testing.steps.Selenium_Regression_Testin.output.status>
                                 
                                h3. Test Summary
                                ||Metric||Value||
                                |Test Suite|<+json.select("testSuite", pipeline.stages.Deploy_to_Mock.spec.execution.steps.Blue_Green_Deployment.steps.QA_Testing.steps.Selenium_Regression_Testin.output.httpResponseBody)>|
                                |Test Class|<+json.select("testClass", pipeline.stages.Deploy_to_Mock.spec.execution.steps.Blue_Green_Deployment.steps.QA_Testing.steps.Selenium_Regression_Testin.output.httpResponseBody)>|
                                |Total Tests|<+json.select("testSummaryReport.totalTests", pipeline.stages.Deploy_to_Mock.spec.execution.steps.Blue_Green_Deployment.steps.QA_Testing.steps.Selenium_Regression_Testin.output.httpResponseBody)>|
                                |Passed|<+json.select("testSummaryReport.passed", pipeline.stages.Deploy_to_Mock.spec.execution.steps.Blue_Green_Deployment.steps.QA_Testing.steps.Selenium_Regression_Testin.output.httpResponseBody)>|
