                                |Language|<+json.select("testEnvironmentDetails.programmingLanguage", pipeline.stages.Deploy_to_Mock.spec.execution.steps.Blue_Green_Deployment.steps.QA_Testing.steps.Selenium_Regression_Testin.output.httpResponseBody)>|
                                |Build Tool|<+json.select("testEnvironmentDetails.buildTool", pipeline.stages.Deploy_to_Mock.spec.execution.steps.Blue_Green_Deployment.steps.QA_Testing.steps.Selenium_Regression_Testin.output.httpResponseBody)>|
