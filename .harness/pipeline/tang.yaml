                          Deployment URL: <+pipeline.executionUrl>
                          Execution ID: <+pipeline.executionId>
                          Change Requested By: <+pipeline.triggeredBy.name>
                          Request Email: <+pipeline.triggeredBy.email>

                          Environment Information
                          Target Environment: Production
                          Previous Deployment: <+env.lastSuccessfulDeploymentId>


                          This is an automated notification from Harness CD Platform.
                      - name: short_description
                        value: <+service.name> - Production Deployment Update [<+pipeline.executionId>]
                      - name: close_code
                        value: unsuccessful
                      - name: close_notes
                        value: <+service.name> promotion to production failed and was automatically rolled back.
                      - name: work_notes
                        value: |-
                          <+env.name> gates failed.
                          Successfully rolled back <+artifacts.primary.imagePath>:<+artifacts.primary.tag> for the <+service.name> service to <+env.name>
                          Pipeline Execution: <+pipeline.executionUrl>
                  timeout: 10m
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
