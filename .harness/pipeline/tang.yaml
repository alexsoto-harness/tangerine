    - stage:
        name: ServiceNow Approval
        identifier: ServiceNow_Approval
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Create Change Request
                  identifier: Create_Change_Request
                  type: ServiceNowCreate
                  timeout: 5m
                  spec:
                    connectorRef: account.ServiceNow_Dev
                    ticketType: change_request
                    fields:
                      - name: description
                        value: |-
                          Change Summary: Request for promotion of <+pipeline.stages.Deploy_to_Mock.spec.service.name> to Production 
                          Artifact: <+pipeline.variables.image_name>:<+pipeline.variables.image_tag> 
                      - name: short_description
                        value: |
                          Request promotion from Mock to Production for <+pipeline.stages.Deploy_to_Mock.spec.service.name>
                      - name: state
                        value: "-2"
                      - name: requested_by
                        value: 623b03a63ba97650b1e96b8ea3e45a93
                      - name: assignment_group
                        value: d305616d933ada100f38fb4e1dba105b
                    createType: Normal
              - step:
                  name: Approve CR
                  identifier: Approve_CR
                  type: ServiceNowApproval
                  timeout: 1d
                  spec:
                    approvalCriteria:
                      type: KeyValues
                      spec:
                        matchAnyCondition: true
                        conditions:
                          - key: state
                            operator: equals
                            value: Implement
                    rejectionCriteria:
                      type: KeyValues
                      spec:
                        matchAnyCondition: true
                        conditions: []
                    connectorRef: account.ServiceNow_Dev
                    ticketNumber: <+execution.steps.Create_Change_Request.ticket.ticketNumber>
                    retryInterval: 10s
                    ticketType: change_request
        tags: {}
    - stage:
        name: Deploy to Prod
        identifier: Deploy_to_Prod
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: Tangerine_Sample
          environment:
            environmentRef: Prod_GKE_Tangerine
            deployToAll: false
            infrastructureDefinitions:
              - identifier: Prod_GKE
          execution:
            steps:
              - stepGroup:
                  name: Canary Deployment
                  identifier: canaryDeployment
                  steps:
                    - step:
                        name: Canary Deployment
                        identifier: canaryDeployment
                        type: K8sCanaryDeploy
                        timeout: 10m
                        spec:
                          instanceSelection:
                            type: Count
                            spec:
                              count: 1
                          skipDryRun: false
                    - parallel:
                        - step:
                            type: Http
                            name: Release Verification
                            identifier: Release_Verification
                            spec:
                              url: https://harness.free.beeceptor.com/resiliency-score
                              method: GET
                              headers: []
                              inputVariables: []
                              outputVariables: []
                            timeout: 10s
                        - step:
                            type: ServiceNowUpdate
                            name: Update CR State
                            identifier: Update_CR_State
                            spec:
                              useServiceNowTemplate: false
                              connectorRef: account.ServiceNow_Dev
                              ticketType: change_request
                              ticketNumber: <+pipeline.stages.ServiceNow_Approval.spec.execution.steps.Create_Change_Request.ticket.ticketNumber>
                              fields:
                                - name: state
                                  value: "0"
                                - name: comments_and_work_notes
                                  value: Canary in Progress
                            timeout: 10m
                    - step:
                        name: Canary Delete
                        identifier: canaryDelete
                        type: K8sCanaryDelete
                        timeout: 10m
                        spec: {}
              - stepGroup:
                  name: Primary Deployment
                  identifier: primaryDeployment
                  steps:
                    - step:
                        name: Rolling Deployment
                        identifier: rollingDeployment
                        type: K8sRollingDeploy
                        timeout: 10m
                        spec:
                          skipDryRun: false
                    - step:
                        type: ShellScript
                        name: Retrieve Service Endpoint
                        identifier: Retrieve_Service_Endpoint
                        spec:
                          shell: Bash
                          executionTarget: {}
                          source:
                            type: Inline
                            spec:
                              script: |-
                                echo "CR number: <+pipeline.stages.ServiceNow_Approval.spec.execution.steps.Approve_CR.output.ticketNumber>"
                                SERVICE_NAME="<+pipeline.stages.Deploy_to_Prod.spec.execution.steps.primaryDeployment.steps.rollingDeployment.deploymentInfoOutcome.serverInstanceInfoList[0].containerList[0].name>-service"
                                NAMESPACE="<+infra.namespace>"
                                TIMEOUT=300

                                echo "Waiting for GKE LoadBalancer IP for: ${SERVICE_NAME} in namespace: ${NAMESPACE}"
                                  
                                START_TIME=$(date +%s)
                                EXTERNAL_IP=""
                                 
                                while [ -z "${EXTERNAL_IP}" ] || [ "${EXTERNAL_IP}" = "<none>" ] || [ "${EXTERNAL_IP}" = "<pending>" ]; do
                                  EXTERNAL_IP=$(kubectl get svc "${SERVICE_NAME}" -n "${NAMESPACE}" -o wide 2>/dev/null | awk 'NR==2 {print $4}')
                                  
                                  ELAPSED=$(($(date +%s) - START_TIME))
                                  if [ ${ELAPSED} -ge ${TIMEOUT} ]; then
                                    echo "Timeout after ${TIMEOUT}s"
                                    exit 1
                                  fi
                                  
                                  if [ -z "${EXTERNAL_IP}" ] || [ "${EXTERNAL_IP}" = "<none>" ] || [ "${EXTERNAL_IP}" = "<pending>" ]; then
                                    echo "Waiting... (${ELAPSED}s)"
                                    sleep 10
                                  fi
                                done
                                 
                                ENDPOINT="http://${EXTERNAL_IP}"
                                echo "Endpoint: ${ENDPOINT}"
                                 
                                export ENDPOINT
                                export EXTERNAL_IP
                          environmentVariables: []
                          outputVariables:
                            - name: EXTERNAL_IP
                              type: String
                              value: EXTERNAL_IP
                        timeout: 10m
                  delegateSelectors:
                    - se-sandbox-org-delegate
              - step:
                  type: ShellScript
                  name: Parse Verification Results
                  identifier: Parse_Verification_Results
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: |-
                          #!/bin/bash

                          EXTERNAL_IP="<+pipeline.stages.Deploy_to_Prod.spec.execution.steps.primaryDeployment.steps.Retrieve_Service_Endpoint.output.outputVariables.EXTERNAL_IP>"
                          STATUS="<+pipeline.stages.Deploy_to_Prod.spec.execution.steps.canaryDeployment.steps.Release_Verification.output.status>"
                          RESPONSE_BODY='<+pipeline.stages.Deploy_to_Prod.spec.execution.steps.canaryDeployment.steps.Release_Verification.output.httpResponseBody>'

                          # Parse JSON fields using jq
                          RESILIENCY_SCORE=$(echo "$RESPONSE_BODY" | jq -r '.resiliencyScore // "N/A"')
                          FAULTS_PASSED=$(echo "$RESPONSE_BODY" | jq -r '.faultsPassed // "N/A"')
                          FAULTS_FAILED=$(echo "$RESPONSE_BODY" | jq -r '.faultsFailed // "N/A"')
                          AVG_RESPONSE_TIME=$(echo "$RESPONSE_BODY" | jq -r '.averageResponseTimeMs // "N/A"')
                          ERRORS_PER_MIN=$(echo "$RESPONSE_BODY" | jq -r '.errorsPerMinute // "N/A"')
                          THROUGHPUT=$(echo "$RESPONSE_BODY" | jq -r '.throughputCallsPerMinute // "N/A"')
                          DESCRIPTION=$(echo "$RESPONSE_BODY" | jq -r '.description // "N/A"')

                          # Build the release verification report in JIRA wiki markup
                          RELEASE_VERIFICATION=$(cat <<EOF
                          h2. 🌐 Production Endpoint
                          *Application URL:* [http://${EXTERNAL_IP}/|http://${EXTERNAL_IP}/]

                          ----

                          h1. 🚦 Release Verification Report
                           
                          *Status:* ${STATUS}
                           
                          h2. 📊 Resiliency Summary
                          ||Metric||Value||
                          |Resiliency Score|${RESILIENCY_SCORE}|
                          |Faults Passed|${FAULTS_PASSED}|
                          |Faults Failed|${FAULTS_FAILED}|
                           
                          h2. ⚡ Performance Metrics
                          ||Metric||Value||
                          |Avg Response Time|${AVG_RESPONSE_TIME} ms|
                          |Errors Per Minute|${ERRORS_PER_MIN}|
                          |Throughput|${THROUGHPUT} calls/min|
                           
                          h2. 📝 Description
                          {quote}
                          ${DESCRIPTION}
                          {quote}
                           
                          ----
                          _Generated by Harness Pipeline_
                          EOF
                          )

                          echo "$RELEASE_VERIFICATION"

                          # Export to output variable
                          export RELEASE_VERIFICATION_RESULTS="$RELEASE_VERIFICATION"
                    environmentVariables: []
                    outputVariables:
                      - name: RELEASE_VERIFICATION_RESULTS
                        type: String
                        value: RELEASE_VERIFICATION_RESULTS
                    delegateSelectors:
                      - se-sandbox-org-delegate
                  timeout: 10m
              - parallel:
                  - step:
                      type: ServiceNowUpdate
                      name: Close CR
                      identifier: Close_CR
                      spec:
                        useServiceNowTemplate: false
                        connectorRef: account.ServiceNow_Dev
                        ticketType: change_request
                        ticketNumber: <+pipeline.stages.ServiceNow_Approval.spec.execution.steps.Create_Change_Request.ticket.ticketNumber>
                        fields:
                          - name: description
                            value: |-
                              CHANGE MANAGEMENT NOTIFICATION
                              Service Deployment Update
                              Service: <+service.name>
                              Status: Successfully promoted to production environment

                              Deployment Details
                              Change Summary: Promotion of <+service.name> to production environment
                              Pipeline Name: <+pipeline.name>
                              Artifact Version: <+artifact.image>
                              Deployment URL: <+pipeline.executionUrl>
                              Execution ID: <+pipeline.executionId>
                              Change Requested By: <+pipeline.triggeredBy.name>
                              Request Email: <+pipeline.triggeredBy.email>

                              Environment Information
                              Target Environment: Production
                              Previous Deployment: <+env.lastSuccessfulDeploymentId>

                              This is an automated notification from Harness CD Platform.
                          - name: short_description
                            value: <+service.name> - Production Deployment Update [<+pipeline.executionId>]
                          - name: close_code
                            value: successful
                          - name: close_notes
                            value: Successfully promoted <+service.name> to production
                          - name: work_notes
                            value: |-
                              <+env.name> gates passed.
                              Successfully deployed <+artifacts.primary.imagePath>:<+artifacts.primary.tag> for the <+service.name> service to <+env.name>
                              Pipeline Execution: <+pipeline.executionUrl>
                      timeout: 10m
                  - step:
                      type: JiraUpdate
                      name: Post Deploy Jira Update
                      identifier: Update_Jira
                      spec:
                        connectorRef: account.Harness_JIRA
                        issueKey: <+pipeline.stages.audit.spec.execution.steps.Create_Jira_Ticket.issue.key>
                        transitionTo:
                          transitionName: ""
                          status: Done
                        fields:
                          - name: Comment
                            value: <+pipeline.stages.Deploy_to_Prod.spec.execution.steps.Parse_Verification_Results.output.outputVariables.RELEASE_VERIFICATION_RESULTS>
                        issueType: Task
                        projectKey: HD
                      timeout: 10m
            rollbackSteps:
              - step:
                  type: ServiceNowUpdate
                  name: Update CR State
                  identifier: Update_CR_State
                  spec:
                    useServiceNowTemplate: false
                    connectorRef: account.ServiceNow_Dev
                    ticketType: change_request
                    ticketNumber: <+pipeline.stages.ServiceNow_Approval.spec.execution.steps.Create_Change_Request.ticket.ticketNumber>
                    fields:
                      - name: comments_and_work_notes
                        value: Beginning Rollback
                      - name: state
                        value: "0"
                  timeout: 10m
              - step:
                  name: Canary Delete
                  identifier: rollbackCanaryDelete
                  type: K8sCanaryDelete
                  timeout: 10m
                  spec: {}
              - step:
                  name: Rolling Rollback
                  identifier: rollingRollback
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}
              - step:
                  type: ServiceNowUpdate
                  name: Close CR with Failure
                  identifier: Close_CR_with_Failure
                  spec:
                    useServiceNowTemplate: false
                    connectorRef: account.ServiceNow_Dev
                    ticketType: change_request
                    ticketNumber: <+pipeline.stages.ServiceNow_Approval.spec.execution.steps.Create_Change_Request.ticket.ticketNumber>
                    fields:
                      - name: description
                        value: |-
                          CHANGE MANAGEMENT NOTIFICATION
